repos:
  - repo: local
    hooks:
      - id: strip-jupyter-notebook-outputs
        name: Strip Jupyter notebook outputs
        entry: python3 scripts/strip_notebook_outputs.py
        language: system
        files: \.ipynb$
        pass_filenames: true

      - id: pytest-burst-pipeline
        name: Pytest – burst pipeline contract tests
        entry: /global/homes/m/mpatil1/.conda/envs/spikeinterface/bin/python -m pytest
        args: [tests/, -x, -q, --tb=short]
        language: system
        files: ^(parameter_free_burst_detector\.py|helper_functions\.py|mea_reports\.py|tests/)
        pass_filenames: false
